<!DOCTYPE html>
<html>
<head>
  <title>Asteroids</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;

  window.addEventListener('resize', () => {
    const scaleX = canvas.clientWidth  / canvas.width;
    const scaleY = canvas.clientHeight / canvas.height;
    canvas.width  = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
    ship.x *= scaleX; ship.y *= scaleY;
    for (const a of asteroids) { a.x *= scaleX; a.y *= scaleY; }
    for (const b of bullets)   { b.x *= scaleX; b.y *= scaleY; }
  });

  const ship = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    angle: 0,        // radians, 0 = pointing up
    rotSpeed: 0.05,
    vx: 0, vy: 0,
    thrust: 0.2,
    friction: 0.98
  };

  const keys = {};
  document.addEventListener('keydown', e => keys[e.key] = true);
  document.addEventListener('keyup',   e => keys[e.key] = false);

  const bullets = [];
  const BULLET_SPEED = 10;
  const BULLET_LIFE  = 60; // frames
  let score = 0;
  let lives = 3;
  let invulnerable = 0; // frames remaining

  const asteroids = [];
  const SIZES = { large: 90, medium: 45, small: 20 };
  const POINTS = { large: 20, medium: 50, small: 100 };
  const NEXT = { large: 'medium', medium: 'small' };
  const SPEEDS = { large: 1, medium: 2, small: 4 };

  function spawnAsteroid(size, x, y) {
    const angle = Math.random() * Math.PI * 2;
    const speed = SPEEDS[size];
    // generate jagged vertices
    const verts = [];
    const n = 10;
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const r = SIZES[size] * (0.75 + Math.random() * 0.45);
      verts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
    }
    asteroids.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, size, verts });
  }

  function spawnAtEdge(size) {
    const edge = Math.floor(Math.random() * 4);
    let x, y;
    if (edge === 0) { x = Math.random() * canvas.width; y = 0; }
    else if (edge === 1) { x = canvas.width; y = Math.random() * canvas.height; }
    else if (edge === 2) { x = Math.random() * canvas.width; y = canvas.height; }
    else { x = 0; y = Math.random() * canvas.height; }
    spawnAsteroid(size, x, y);
  }

  for (let i = 0; i < 5; i++) spawnAtEdge('large');

  let canShoot = true;
  document.addEventListener('keydown', e => {
    if (e.key === ' ' && canShoot) {
      canShoot = false;
      bullets.push({
        x: ship.x + Math.sin(ship.angle) * 40,
        y: ship.y - Math.cos(ship.angle) * 40,
        vx: Math.sin(ship.angle) * BULLET_SPEED + ship.vx,
        vy: -Math.cos(ship.angle) * BULLET_SPEED + ship.vy,
        life: BULLET_LIFE
      });
    }
  });
  document.addEventListener('keyup', e => { if (e.key === ' ') canShoot = true; });
  document.addEventListener('keydown', e => {
    if ((e.key === 'r' || e.key === 'R') && lives <= 0) {
      lives = 3; score = 0; invulnerable = 0;
      ship.x = canvas.width / 2; ship.y = canvas.height / 2;
      ship.vx = 0; ship.vy = 0; ship.angle = 0;
      bullets.length = 0; asteroids.length = 0;
      for (let i = 0; i < 5; i++) spawnAtEdge('large');
    }
  });

  function drawShip(thrusting, turningLeft, turningRight, braking) {
    if (lives <= 0) return;
    if (invulnerable > 0 && Math.floor(invulnerable / 4) % 2 === 0) return; // blink
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.rotate(ship.angle);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -40);
    ctx.lineTo(24, 30);
    ctx.lineTo(0, 16);
    ctx.lineTo(-24, 30);
    ctx.closePath();
    ctx.stroke();
    if (thrusting) {
      const flicker = 18 + Math.random() * 16;
      ctx.strokeStyle = '#f80';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-10, 22); ctx.lineTo(0, 16 + flicker);
      ctx.moveTo(10, 22);  ctx.lineTo(0, 16 + flicker);
      ctx.stroke();
    }
    // rotation jets
    ctx.strokeStyle = '#dde';
    ctx.lineWidth = 2;
    if (turningLeft && !braking) {
      const f = 1 + Math.random() * 2;
      ctx.beginPath();
      ctx.moveTo(12, -22);  ctx.lineTo(16 + f, -25);
      ctx.moveTo(12, -20);  ctx.lineTo(17 + f, -20);
      ctx.moveTo(12, -18);  ctx.lineTo(16 + f, -15);
      ctx.stroke();
    }
    if (turningRight && !braking) {
      const f = 1 + Math.random() * 2;
      ctx.beginPath();
      ctx.moveTo(-12, -22);  ctx.lineTo(-16 - f, -25);
      ctx.moveTo(-12, -20);  ctx.lineTo(-17 - f, -20);
      ctx.moveTo(-12, -18);  ctx.lineTo(-16 - f, -15);
      ctx.stroke();
    }
    if (braking) {
      const f = 1 + Math.random() * 2;
      // left brake jet — same origin as turn jet, angled forward
      ctx.beginPath();
      ctx.moveTo(12, -22);  ctx.lineTo(16 + f, -27);
      ctx.moveTo(12, -20);  ctx.lineTo(17 + f, -25);
      ctx.moveTo(12, -18);  ctx.lineTo(16 + f, -23);
      ctx.stroke();
      // right brake jet
      ctx.beginPath();
      ctx.moveTo(-12, -22);  ctx.lineTo(-16 - f, -27);
      ctx.moveTo(-12, -20);  ctx.lineTo(-17 - f, -25);
      ctx.moveTo(-12, -18);  ctx.lineTo(-16 - f, -23);
      ctx.stroke();
    }
    ctx.restore();
  }

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const gameOver = lives <= 0;

    if (!gameOver) {
      if (keys['ArrowLeft']  || keys['a']) ship.angle -= ship.rotSpeed;
      if (keys['ArrowRight'] || keys['d']) ship.angle += ship.rotSpeed;
    }

    const thrusting    = !gameOver && !!(keys['ArrowUp']   || keys['w']);
    const braking      = !gameOver && !!(keys['ArrowDown'] || keys['s']);
    const turningLeft  = !gameOver && !!(keys['ArrowLeft']  || keys['a']);
    const turningRight = !gameOver && !!(keys['ArrowRight'] || keys['d']);

    if (thrusting) {
      ship.vx += Math.sin(ship.angle) * ship.thrust;
      ship.vy -= Math.cos(ship.angle) * ship.thrust;
    }

    ship.vx *= braking ? 0.94 : ship.friction;
    ship.vy *= braking ? 0.94 : ship.friction;
    ship.x += ship.vx;
    ship.y += ship.vy;

    // wrap around edges
    if (ship.x < 0) ship.x = canvas.width;
    if (ship.x > canvas.width) ship.x = 0;
    if (ship.y < 0) ship.y = canvas.height;
    if (ship.y > canvas.height) ship.y = 0;

    if (invulnerable > 0) invulnerable--;

    drawShip(thrusting, turningLeft, turningRight, braking);

    // score + lives
    ctx.fillStyle = '#fff';
    ctx.font = '36px "Press Start 2P", monospace';
    ctx.fillText(score, 20, 52);
    for (let i = 0; i < lives; i++) {
      ctx.save();
      ctx.translate(canvas.width - 50 - i * 50, 40);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -20); ctx.lineTo(12, 14); ctx.lineTo(0, 7); ctx.lineTo(-12, 14);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx; b.y += b.vy; b.life--;
      if (b.life <= 0) { bullets.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }

    // asteroids
    for (let i = asteroids.length - 1; i >= 0; i--) {
      const a = asteroids[i];
      a.x += a.vx; a.y += a.vy;
      if (a.x < 0) a.x = canvas.width;
      if (a.x > canvas.width) a.x = 0;
      if (a.y < 0) a.y = canvas.height;
      if (a.y > canvas.height) a.y = 0;

      ctx.save();
      ctx.translate(a.x, a.y);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(a.verts[0].x, a.verts[0].y);
      for (let v = 1; v < a.verts.length; v++) ctx.lineTo(a.verts[v].x, a.verts[v].y);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();

      if (!gameOver) {
        // bullet collision
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          if (Math.sqrt(dx*dx + dy*dy) < SIZES[a.size]) {
            score += POINTS[a.size];
            bullets.splice(j, 1);
            if (NEXT[a.size]) {
              spawnAsteroid(NEXT[a.size], a.x, a.y);
              spawnAsteroid(NEXT[a.size], a.x, a.y);
            }
            asteroids.splice(i, 1);
            break;
          }
        }

        // ship collision
        if (invulnerable === 0) {
          const dx = ship.x - a.x, dy = ship.y - a.y;
          if (Math.sqrt(dx*dx + dy*dy) < SIZES[a.size] + 20) {
            lives--;
            if (lives > 0) {
              invulnerable = 120;
              ship.vx = 0; ship.vy = 0;
              ship.x = canvas.width / 2; ship.y = canvas.height / 2;
            }
          }
        }
      }
    }

    // game over overlay — drawn last so it's on top
    if (gameOver) {
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = '64px "Press Start 2P", monospace';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);
      ctx.font = '20px "Press Start 2P", monospace';
      ctx.fillText('PRESS R TO RESTART', canvas.width / 2, canvas.height / 2 + 30);
      ctx.textAlign = 'left';
    }

    requestAnimationFrame(loop);
  }

  loop();

  navigator?.serviceWorker.register('/kiro-asteroids/service-worker.js', { scope: '/kiro-asteroids/' });
</script>
</body>
</html>
